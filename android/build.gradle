// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
  repositories {
    google()
    mavenCentral()
  }
  dependencies {
    classpath('com.android.tools.build:gradle')
    classpath('com.facebook.react:react-native-gradle-plugin')
    classpath('org.jetbrains.kotlin:kotlin-gradle-plugin')
  }
}

allprojects {
  repositories {
    google()
    mavenCentral()
    maven { url 'https://www.jitpack.io' }
  }
}

apply plugin: "expo-root-project"
apply plugin: "com.facebook.react.rootproject"

// Keep native libraries on the same installed Build Tools version as the app.
// Some dependencies bring their own Android Gradle Plugin whose default is 35.0.0.
subprojects { subproject ->
  subproject.plugins.withId("com.android.library") {
    subproject.extensions.findByName("android").buildToolsVersion = rootProject.ext.buildToolsVersion
  }
}
